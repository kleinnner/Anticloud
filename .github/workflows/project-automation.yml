name: Project Board Automation
on:
  issues:
    types: [opened, reopened, labeled, assigned]
  pull_request:
    types: [opened, closed, labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.PROJECT_URL }}
          github-token: ${{ secrets.PROJECT_TOKEN }}

  label-sync:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Apply project label from issue template
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const projectMatch = body.match(/### Project\s*\n\s*([^\n]+)/);
            if (projectMatch) {
              const project = projectMatch[1].split('(')[0].trim().toLowerCase().replace(/\s+/g, '-');
              const label = `project/${project}`;
              const labels = issue.labels.map(l => l.name);
              if (!labels.includes(label)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [label]
                });
              }
            }

  move-in-progress:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issues' && github.event.action == 'assigned'
    steps:
      - name: Move to In Progress
        uses: leonsteinhaeuser/project-beta-automations@v2.2.1
        with:
          gh_token: ${{ secrets.PROJECT_TOKEN }}
          organization: kleinnner
          project_id: ${{ vars.PROJECT_NUMBER }}
          resource_node_id: ${{ github.event.issue.node_id }}
          status_value: "In Progress"

  move-to-done:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - name: Move linked issues to Done
        uses: leonsteinhaeuser/project-beta-automations@v2.2.1
        with:
          gh_token: ${{ secrets.PROJECT_TOKEN }}
          organization: kleinnner
          project_id: ${{ vars.PROJECT_NUMBER }}
          resource_node_id: ${{ github.event.pull_request.node_id }}
          status_value: "Done"
