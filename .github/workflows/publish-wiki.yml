name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - wiki-content/**
  workflow_dispatch:

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          TMP_DIR="$(mktemp -d)"
          WIKI_URL="https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          echo "Copying wiki content..."
          cp -r wiki-content/*.md "$TMP_DIR/"

          cd "$TMP_DIR"

          echo "Initializing wiki repo..."
          git init
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add -A
          git commit -m "Update wiki: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0

          echo "Pushing to wiki repo..."
          git remote add origin "$WIKI_URL"
          git push -f origin HEAD:master || git push -f origin HEAD:main

      - name: Cleanup
        run: rm -rf "$TMP_DIR"
