name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - wiki-content/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Internal Links
        run: |
          cd wiki-content
          ERROR=false
          for file in *.md; do
            grep -oP '(?<=\]\()[\w-]+(?=\))' "$file" | while IFS= read -r link; do
              [ -f "${link}.md" ] || [ -f "_${link}.md" ] || { echo "ERROR: $file has broken link: $link"; ERROR=true; }
            done
            if [ "$ERROR" = true ]; then exit 1; fi
          done
          echo "All wiki links verified ✓"

      - name: Push Wiki Content
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          WIKI_URL="https://x-access-token:${WIKI_TOKEN}@github.com/${REPO_LOWER}.wiki.git"
          TMP_DIR="$(mktemp -d)"

          git clone "$WIKI_URL" "$TMP_DIR" || {
            echo "Clone failed, initializing new wiki repo..."
            mkdir -p "$TMP_DIR"
            cd "$TMP_DIR"
            git init
            git remote add origin "$WIKI_URL"
          }

          cd "$TMP_DIR"
          # Remove all existing files (keep .git)
          find . -maxdepth 1 -type f -delete

          # Copy all wiki pages
          cp "$GITHUB_WORKSPACE/wiki-content/"*.md ./

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update wiki: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0
          git push origin HEAD:master || git push origin HEAD:main
