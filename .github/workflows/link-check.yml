name: Link Check
on:
  schedule:
    - cron: '0 0 * * 0'  # weekly
  pull_request:
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install link checker
        run: npm install -g markdown-link-check
      - name: Find all markdown files
        run: find . -name '*.md' -not -path './node_modules/*' -not -path './.git/*' > /tmp/mdfiles.txt
      - name: Check links
        run: |
          while IFS= read -r file; do
            echo "Checking: $file"
            npx markdown-link-check --config .github/link-check-config.json "$file" || true
          done < /tmp/mdfiles.txt
